<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aures Elite Mentoring — UI Mockup</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* Deep Corporate Blue */
      --primary: #0B2B5E;
      --primary-dark: #071C40;
      /* Elite Gold Accents */
      --gold: #D4AF37;
      --gold-dark: #B5952F;
      --gold-light: rgba(212, 175, 55, 0.15);

      /* Base Colors */
      --bg-gradient: linear-gradient(135deg, #F8F9FA 0%, #E9ECEF 100%);
      --surface: rgba(255, 255, 255, 0.85);
      /* For Glassmorphism */
      --surface-solid: #ffffff;
      --border: rgba(11, 43, 94, 0.1);
      --border-gold: rgba(212, 175, 55, 0.3);

      /* Text */
      --text: #1A1A1A;
      --text-muted: #6C757D;

      /* Status */
      --error: #D32F2F;
      --error-light: rgba(211, 47, 47, 0.1);
      --success: #1B5E20;
      --success-light: rgba(27, 94, 32, 0.1);
      --info: #0288D1;
      --info-light: rgba(2, 136, 209, 0.1);
      --warning: #F57C00;
      --warning-light: rgba(245, 124, 0, 0.1);

      /* Shape */
      --r-sm: 6px;
      --r-md: 16px;
      --r-pill: 30px;

      /* Shadows */
      --sh-sm: 0 4px 15px rgba(11, 43, 94, 0.05);
      --sh-md: 0 10px 30px rgba(11, 43, 94, 0.08);
      --sh-lg: 0 20px 40px rgba(11, 43, 94, 0.12);

      --t: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);

      /* Glassmorphism */
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-border: 1px solid rgba(255, 255, 255, 0.5);
      --glass-blur: blur(12px);
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
      background-attachment: fixed;
    }

    /* Fancy Background Blobs for Glass Effect */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      z-index: -1;
      filter: blur(100px);
      opacity: 0.5;
    }

    body::before {
      top: -10%;
      left: -10%;
      width: 40vw;
      height: 40vw;
      background: rgba(11, 43, 94, 0.15);
      /* Primary */
    }

    body::after {
      bottom: -10%;
      right: -10%;
      width: 30vw;
      height: 30vw;
      background: rgba(212, 175, 55, 0.15);
      /* Gold */
    }

    /* ---- DEMO BAR ---- */
    .demo-bar {
      background: #000;
      color: rgba(255, 255, 255, .7);
      padding: 10px 24px;
      font-size: 11px;
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .demo-bar strong {
      color: var(--gold);
    }

    /* ---- APP WRAPPER ---- */
    .app {
      max-width: 1080px;
      margin: 40px auto;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      box-shadow: var(--sh-lg);
      border-radius: 20px;
      border: var(--glass-border);
      overflow: hidden;
      margin-bottom: 60px;
    }

    /* ---- HEADER ---- */
    .header {
      background: linear-gradient(135deg, var(--primary) 0%, #153A70 100%);
      padding: 30px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      border-bottom: 2px solid var(--gold);
    }

    /* Subtle Gold pattern overlay on header */
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: radial-gradient(var(--gold) 1px, transparent 1px);
      background-size: 20px 20px;
      opacity: 0.05;
      pointer-events: none;
    }

    .header-brand {
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* AURES Logo Placeholder */
    .logo-mock {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      min-width: 90px;
      height: 48px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      border-radius: 12px;
      color: var(--primary);
      font-family: Arial, Helvetica, sans-serif;
      font-weight: 900;
      font-size: 21px;
      letter-spacing: 0px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .header-title-wrapper {
      display: flex;
      flex-direction: column;
    }

    .header-title {
      color: #fff;
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-title span {
      color: var(--gold);
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      letter-spacing: 2px;
      font-size: 14px;
      display: block;
      margin-top: -4px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 1;
    }

    .user-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .user-name {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 12px;
      border-radius: var(--r-pill);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .role-talent {
      background: rgba(255, 255, 255, .1);
      color: #fff;
    }

    .role-mentor {
      background: var(--gold-light);
      color: var(--gold);
      border-color: var(--gold);
    }

    .role-hr {
      background: rgba(2, 136, 209, 0.2);
      color: #64B5F6;
      border-color: #64B5F6;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface-solid);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-weight: 700;
      font-size: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      border: 2px solid var(--gold);
    }

    /* ---- ROLE SWITCHER ---- */
    .role-switcher {
      background: var(--surface-solid);
      padding: 12px 40px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }

    .role-switcher-label {
      font-weight: 600;
      margin-right: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .role-btn {
      padding: 6px 18px;
      border-radius: var(--r-pill);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: var(--t);
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .role-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .role-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: var(--sh-sm);
    }

    /* ---- NAV ---- */
    .nav {
      background: transparent;
      padding: 0 40px;
      display: flex;
      gap: 30px;
      border-bottom: 1px solid var(--border);
    }

    .nav-tab {
      padding: 24px 0 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: var(--t);
      position: relative;
    }

    .nav-tab:hover {
      color: var(--primary);
    }

    .nav-tab.active {
      color: var(--primary);
      border-bottom-color: var(--gold);
    }

    .nav-badge {
      position: absolute;
      top: 15px;
      right: -20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--error);
      color: #fff;
      border-radius: var(--r-pill);
      font-size: 10px;
      font-weight: 700;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      box-shadow: 0 2px 5px rgba(211, 47, 47, 0.4);
    }

    /* ---- CONTENT ---- */
    .content {
      padding: 40px;
      min-height: 520px;
    }

    /* ---- VIEWS ---- */
    .view {
      animation: fadeUp .4s ease backwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ---- PAGE HEADER ---- */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 600;
      color: var(--primary);
    }

    /* ---- BUTTONS ---- */
    button {
      font-family: inherit;
      cursor: pointer;
      transition: var(--t);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
      color: #fff;
      border: none;
      padding: 12px 28px;
      border-radius: var(--r-pill);
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
      background: linear-gradient(135deg, #e5C158 0%, var(--gold-dark) 100%);
    }

    .btn-secondary {
      background: var(--surface-solid);
      color: var(--primary);
      border: 2px solid var(--primary);
      padding: 10px 26px;
      border-radius: var(--r-pill);
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-secondary:hover {
      background: var(--primary);
      color: #fff;
    }

    .btn-approve {
      background: var(--success);
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: var(--r-pill);
      font-size: 13px;
      font-weight: 600;
      box-shadow: 0 4px 10px var(--success-light);
    }

    .btn-approve:hover {
      background: #144918;
      transform: translateY(-1px);
      box-shadow: 0 6px 15px rgba(27, 94, 32, 0.3);
    }

    .btn-reject {
      background: transparent;
      color: var(--error);
      border: 1px solid var(--error);
      padding: 9px 23px;
      border-radius: var(--r-pill);
      font-size: 13px;
      font-weight: 600;
    }

    .btn-reject:hover {
      background: var(--error-light);
    }

    .btn-back {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      padding: 0;
      margin-bottom: 24px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-back:hover {
      color: var(--primary);
    }

    /* ---- STATUS BADGES ---- */
    .status-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 16px;
      border-radius: var(--r-pill);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .s-pending {
      background: var(--warning-light);
      color: var(--warning);
      border: 1px solid rgba(245, 124, 0, 0.2);
    }

    .s-approved {
      background: var(--success-light);
      color: var(--success);
      border: 1px solid rgba(27, 94, 32, 0.2);
    }

    .s-hr {
      background: var(--error-light);
      color: var(--error);
      border: 1px solid rgba(211, 47, 47, 0.2);
    }

    .s-scheduled {
      background: var(--info-light);
      color: var(--info);
      border: 1px solid rgba(2, 136, 209, 0.2);
    }

    .s-cancelled {
      background: #E9ECEF;
      color: var(--text-muted);
    }

    /* ---- MENTOR GRID ---- */
    .mentor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
    }

    .mentor-card {
      background: var(--surface-solid);
      border-radius: var(--r-md);
      box-shadow: var(--sh-sm);
      border: 1px solid var(--border);
      padding: 30px;
      display: flex;
      flex-direction: column;
      transition: var(--t);
      position: relative;
      overflow: hidden;
    }

    /* Subtle highlight on top */
    .mentor-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: transparent;
      transition: var(--t);
    }

    .mentor-card:hover {
      box-shadow: var(--sh-md);
      transform: translateY(-5px);
    }

    .mentor-card:hover::before {
      background: var(--gold);
    }

    .mentor-card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .mentor-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 20px;
      flex-shrink: 0;
      border: 2px solid var(--gold-light);
      font-family: 'Playfair Display', serif;
    }

    .mentor-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    .mentor-job {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 500;
    }

    .mentor-superpower {
      font-size: 13px;
      font-weight: 600;
      color: var(--gold-dark);
      background: var(--gold-light);
      padding: 8px 12px;
      border-radius: var(--r-sm);
      margin-bottom: 16px;
      display: inline-block;
    }

    .mentor-avatar-photo {
      width: 80px;
      height: 80px;
      border: none;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.25);
    }

    .mentor-bio {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .mentor-details {
      margin-bottom: 20px;
      flex: 1;
    }

    .mentor-details-toggle {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      cursor: pointer;
      padding: 6px 0;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mentor-details-toggle::before {
      content: '▸';
      font-size: 12px;
      transition: transform 0.2s ease;
    }

    .mentor-details[open] > .mentor-details-toggle::before {
      transform: rotate(90deg);
    }

    .mentor-details-toggle:hover {
      color: var(--gold-dark);
    }

    .mentor-details-toggle::-webkit-details-marker {
      display: none;
    }

    .mentor-details-content {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      padding-top: 10px;
      animation: fadeUp 0.3s ease;
    }

    .mentor-details-content p {
      margin-bottom: 12px;
    }

    .mentor-challenge {
      font-size: 13px;
      color: var(--primary);
      background: rgba(11, 43, 94, 0.04);
      padding: 10px 14px;
      border-radius: var(--r-sm);
      border-left: 3px solid var(--gold);
      line-height: 1.6;
    }

    .mentor-availability {
      font-size: 12px;
      font-weight: 600;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 24px;
    }

    .mentor-availability::before {
      content: '•';
      font-size: 18px;
    }

    .mentor-card-actions .btn-secondary {
      width: 100%;
      border-radius: var(--r-md);
    }

    /* ---- REQUEST LIST ---- */
    .request-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .request-card {
      background: var(--surface-solid);
      border-radius: var(--r-md);
      box-shadow: var(--sh-sm);
      border: 1px solid var(--border);
      padding: 24px 30px;
      transition: var(--t);
    }

    .request-card:hover {
      box-shadow: var(--sh-md);
    }

    .request-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .request-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
      font-family: 'Playfair Display', serif;
    }

    .request-mentors {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .mentor-tag {
      padding: 6px 14px;
      border-radius: var(--r-pill);
      font-size: 12px;
      font-weight: 600;
      background: #F8F9FA;
      color: var(--text-muted);
      border: 1px solid #E9ECEF;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mentor-tag span.badge-num {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      font-size: 10px;
    }

    .mt-approved {
      background: var(--success-light);
      color: var(--success);
      border-color: rgba(27, 94, 32, 0.2);
    }

    .mt-rejected {
      background: var(--error-light);
      color: var(--error);
      border-color: rgba(211, 47, 47, 0.2);
      text-decoration: line-through;
    }

    .mt-current {
      background: var(--surface-solid);
      color: var(--gold-dark);
      border-color: var(--gold);
      box-shadow: 0 0 10px var(--gold-light);
    }

    /* ---- PENDING ROW ---- */
    .pending-row {
      background: var(--surface-solid);
      border-radius: var(--r-md);
      box-shadow: var(--sh-sm);
      border: 1px solid var(--border);
      padding: 24px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: var(--t);
    }

    .pending-row:hover {
      box-shadow: 0 10px 25px var(--gold-light);
      transform: translateY(-2px);
      border-color: var(--gold);
    }

    .pending-row-left {
      flex: 1;
    }

    .pending-row-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .talent-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .msg-preview {
      font-size: 14px;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.6;
    }

    .stage-indicator {
      padding: 4px 12px;
      border-radius: var(--r-sm);
      background: rgba(11, 43, 94, 0.05);
      color: var(--primary);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .arrow-icon {
      color: var(--gold);
      font-size: 32px;
      margin-left: 20px;
      font-weight: 300;
    }

    /* ---- REQUEST DETAIL ---- */
    .detail-card {
      background: var(--surface-solid);
      border-radius: var(--r-md);
      box-shadow: var(--sh-md);
      border: 1px solid var(--border);
      padding: 40px;
      max-width: 700px;
      border-top: 4px solid var(--gold);
    }

    .detail-section {
      margin-bottom: 30px;
    }

    .detail-section:last-child {
      margin-bottom: 0;
    }

    .detail-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .detail-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--primary);
    }

    .talent-msg {
      background: #F8F9FA;
      border-left: 3px solid var(--gold);
      padding: 20px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      font-style: italic;
    }

    .reject-hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(11, 43, 94, 0.03);
      border-radius: var(--r-sm);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .reject-hint::before {
      content: 'ℹ';
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--text-muted);
      color: #fff;
      font-size: 12px;
      font-style: normal;
    }

    .decision-btns {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }

    /* ---- HISTORY ---- */
    .history-card {
      background: var(--surface-solid);
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      padding: 20px 30px;
      display: flex;
      align-items: center;

    .section-hint {

      font-weight: 700;

      border: 1px solid var(--border);

      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;

      font-weight: 600;

      align-items: center;

    }

      font-weight: 700;

    }

      font-weight: 700;

    .form-sec-title {

      font-weight: 600;
      color: var(--primary);
    }

    .msel-job {

    }

    .msg-group {
      margin-bottom: 20px;

    .msg-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .msg-textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 16px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: var(--t);
      color: var(--text);
      background: var(--surface-solid);

    }

    .msg-textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px var(--gold-light);
    }

    .form-actions {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-top: 10px;
    }

    /* ---- EMPTY ---- */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty p {
      font-size: 16px;
      font-weight: 500;
    }
  </style>
</head>

  <script>

    const MENTORS = [
      { id: 1, ini: 'KT', name: 'Karolína Topolová', job: 'co-CEO', super: 'Networking, change management, schopnost ovlivňovat a propojovat lidi', bio: 'Karolína Topolová začala svou kariéru v roce 1998 založením firemního call centra, které tehdy tvořilo pět lidí a postupně vyrostlo v profesionální tým s více než 200 zaměstnanci. Během své kariéry prošla řadou manažerských rolí napříč oblastmi sales, financování, HR i externí komunikace.', bioFull: 'Díky této zkušenosti získala komplexní pohled na fungování firmy a její růst. V roce 2012 se stala Generální ředitelkou společnosti, a o tři roky později také Předsedkyní představenstva. Dnes patří mezi nejvlivnější ženy českého businessu, a je spojována s úspěšnou transformací a rozvojem firmy.', challenge: 'Úspěšně provést firmu zásadní transformací v období ekonomické krize a pandemie COVID-19.', cap: 2, img: 'pic/topolova.jpg' },
      { id: 2, ini: 'PV', name: 'Petr Vaněček', job: 'co-CEO', super: 'Schopnost proměňovat data a technologické inovace v konkrétní businessová řešení a růst firmy', bio: 'Petr Vaněček ve společnosti působí více než dvě dekády a během této doby prošel řadou klíčových manažerských rolí napříč businessem. Díky hluboké znalosti fungování firmy i trhu se dlouhodobě podílí na jejím strategickém směřování a rozvoji.', bioFull: 'V roli Co-CEO se soustředí zejména na rozvoj businessu, digitalizaci, práci s daty a technologické inovace. Je známý schopností propojovat detailní znalost operativy s dlouhodobou vizí a hledat nové cesty růstu. Kolegové na něm oceňují především tah na výsledek, pragmatický přístup a schopnost posouvat věci dopředu.', challenge: 'Krizový management za Covidu.', cap: 2, img: 'pic/vanecek.jpg' },
      { id: 4, ini: 'MH', name: 'Martin Hrudník', job: 'COO', super: 'Schopnost přetavit detailní znalost operativy v efektivní strategii nákupu a růstu', bio: 'Martin Hrudník působí ve společnosti jako COO a je zodpovědný za nákupní strategii společnosti, související marketingové aktivity a projekty podporující další expanzi skupiny. Do firmy nastoupil již v roce 1999 a během své kariéry prošel řadou pozic v oblasti nákupu a provozu.', bioFull: 'Začínal jako asistent nákupu, později působil jako regionální nákupní manažer a v roce 2017 se stal Group Purchasing Directorem. Díky zkušenostem z různých poboček v Česku i na Slovensku má hluboké porozumění fungování businessu i trhu s ojetými vozy. Ve vedení společnosti dnes propojuje operativní zkušenost s dlouhodobým rozvojem nákupní strategie a podporou nových růstových projektů.', challenge: 'Po 15 letech ve výkupní „bublině" převzetí odpovědnosti i za prodejní výsledky.', cap: 2, img: 'pic/hrudnik.jpg' },
      { id: 3, ini: 'LV', name: 'Luboš Vorlík', job: 'Managing Director CZ/SK', super: 'Motivace a vedení týmu, orientace na výsledek, prezentační a komunikační dovednosti', bio: 'Luboš Vorlík ve společnosti působí jako Výkonný ředitel pro Českou republiku a Slovensko, kde zodpovídá za strategické řízení a další rozvoj společnosti na obou trzích. Do firmy nastoupil v roce 2003 a během svého působení prošel řadou zákaznicky orientovaných pozic.', bioFull: 'Tato zkušenost mu poskytla hluboké porozumění potřebám klientů i fungování obchodních procesů. Ve své práci se soustředí na růst výkonu organizace, budování silných týmů a dlouhodobou hodnotu pro zákazníky i firmu. Věří v leadership založený na spolupráci, odpovědnosti a orientaci na výsledky. Ve volném čase se věnuje četbě a pobytu v přírodě.', challenge: 'Transformace sales departmentu na SK.', cap: 2, img: 'pic/vorlik.jpg' },
      { id: 5, ini: 'DL', name: 'Daniel Luňáček', job: 'Group Sales Director', super: 'Jak dosáhnout výsledku pomocí analýzy, lidí kolem sebe a správně nastavených procesů', bio: 'Daniel Luňáček působí ve firmě 25 let. Svou kariéru začal jako representant v call centru a postupně se vypracoval přes pozici manažera poboček až na Regional Managera pro Českou republiku a Slovensko.', bioFull: 'Následně působil jako Country Manager pro CZ a SK a v současnosti zastává pozici Group Sales Director. Mezi jeho silné stránky patří orientace na výsledek, leadership, rozvoj lidí a předávání zkušeností. Klíčová je pro něj také hluboká znalost systémů, reportingu a procesů, přičemž největší důraz klade na týmovou spolupráci a koordinaci s ostatními divizemi.', challenge: 'Naučit se delegovat, nevěřit jen v sám sebe, ale v tým.', cap: 2, img: 'pic/lunacek.jpg' },
      { id: 7, ini: 'MV', name: 'Miroslav Vápeník', job: 'Managing Director PL', super: 'Schopnost budovat výkonné obchodní týmy a rozvíjet jejich potenciál', bio: 'Miroslav Vápeník působí ve společnosti dvacátým rokem. Ve firmě si prošel všechny prodejní pozice od Sales Closing Managera až po Country Managera CZ. Aktuálně působí jako Managing Director pro polský trh.', bioFull: 'Podílí se na strategickém růstu a budování silné zákaznické zkušenosti. Má zkušenosti s vedením velkých týmů, řízením změn a nastavováním výkonnostní kultury v obchodních organizacích. Jeho motivací je posouvat lidi kolem sebe k dlouhodobým kvalitním výsledkům.', challenge: 'Převzetí odpovědnosti za řízení a další rozvoj trhu v Polsku — prostředí s jinou zákaznickou mentalitou, silnou konkurencí a potřebou rychle adaptovat obchodní strategii i tým.', cap: 2, img: 'pic/vapenik.jpg' },
      { id: 10, ini: 'MVO', name: 'Marie Voršilková', job: 'Chief HR Officer', super: 'Leadership, motivace lidí, práce se změnou', bio: 'Marie Voršilková pochází z bankovního prostředí, kde prošla prodejními i rozvojovými rolemi v retailovém, korporátním i premium bankovnictví. Postupně ji její cesta přivedla od obchodu přes rozvoj lidí až ke komplexní HR agendě.', bioFull: 'Do HR se dostala i díky vlastní zkušenosti z manažerských rolí, kdy cítila, jak zásadní je kvalitní podpora back-office týmů. Po přechodu do automotive prošla velmi dynamickým obdobím změn — od integrace a slučování entit přes uzavírání zahraničních poboček až po optimalizace a restrukturalizace. Nejvíce ji baví vytvářet prostředí, ve kterém lidé mohou růst, najít motivaci a společně dosahovat výsledků.', challenge: 'Udržet motivaci a energii pracovních týmů v obdobích velkých změn a ekonomických krizí — od bankovní krize v roce 2008 až po dopady války na Ukrajině na automotive sektor.', cap: 2, img: 'pic/vorsilkova.jpg' },
      { id: 9, ini: 'ZV', name: 'Zuzana Voborníková', job: 'Group Staffing Manager', super: 'Schopnost pozitivně motivovat a propojovat lidi napříč týmy i zeměmi', bio: 'Zuzana Voborníková působí na pozici Group Staffing Manager a vede náborové aktivity napříč skupinou ve všech zemích. Má více než dvacet let zkušeností v oblasti HR a recruitmentu v mezinárodních společnostech.', bioFull: 'Ve své roli úzce spolupracuje s managementem na obsazování klíčových pozic a nastavování efektivních náborových procesů podporujících růst firmy. Zaměřuje se na budování silných týmů a prostředí, ve kterém mohou lidé růst a naplno využít svůj potenciál. V minulosti působila například jako Senior Recruiter v Amazonu nebo ve vedoucích recruitment rolích ve firmách CSC či AB InBev.', challenge: 'Skloubení návratu na manažerskou roli s malým dítětem po MD. Otevření a personální obsazení poboček v Německu.', cap: 2, img: 'pic/vobornikova.jpg' },
      { id: 6, ini: 'ZB', name: 'Zdeněk Batěk', job: 'Group Purchasing Director', super: 'Strategické myšlení a převedení vizí do reálné produkce, „zdravý selský rozum"', bio: 'Zdeněk Batěk do AAA nastoupil v roce 2007 hned po střední škole na pozici testovacího technika. Po 3 letech se vrátil do Prahy a začal vykupovat auta jako mobilní výkupčí. V roce 2012 se posunul na pozici manažera mobilního výkupu.', bioFull: 'Během doby, kdy řídil mobilní výkup a dispečink, byl vlastníkem nového projektu Buying Guide/Pricing Guide, který se po dvou letech podařilo zdárně dokončit a spustit do produkce. Po dokončení těchto aplikací dostal možnost dalšího kariérního růstu na pozici Group Purchasing Director, kterou přijal a vykonává ji již třetím rokem.', challenge: 'Rychlý přechod do manažerské pozice v mladém věku s řízením pozičně i věkově starších kolegů. Převzít kompletní odpovědnost za celou divizi nákupu.', cap: 2, img: 'pic/batek.jpg' },
      { id: 8, ini: 'AS', name: 'Alen Svoboda', job: 'General Manager Prague', super: 'Na základě analýzy a empatické komunikace dokáže okolí vysvětlit, kam společně chceme dojít', bio: 'Alen Svoboda působí ve firmě celkem 15 let a momentálně řídí pražský region. Svou kariéru začal jako prodejce na pobočce v Brně, kde velmi rychle postoupil na manažerské pozice.', bioFull: 'Během své firemní i mimofiremní kariéry nabral obrovské zkušenosti s chápáním prodeje jako vztahovou záležitost — nejen mezi firmou a klientem, ale jako soubor všech možných detailů, které ovlivňují výkonnost business modelu. S velkým přesahem a znalostí fungování firmy je schopen uplatnit svůj tah na branku k dosahování krátkodobých i dlouhodobých strategií.', challenge: 'Změnit pohled na strategii spolupracovníků a vysvětlovat hlubší motivanty ovlivňující pozitivní náhled v rámci fungování ve firmě.', cap: 2, img: 'pic/svoboda.jpg' },

      ${CAPACITY.map(m => {
        const pct = m.cap > 0 ? Math.min(100, Math.round(m.approved / m.cap * 100)) : 100;
        const barCls = pct >= 100 ? 'bar-full-c' : pct >= 75 ? 'bar-high' : 'bar-ok';
        const rem = Math.max(0, m.cap - m.approved);
        return `
          <div class="cap-row">
            <div class="cap-top">
              <div>
                <div class="mgmt-name">${m.name}</div>
                <div class="mgmt-meta">${m.job}</div>
              </div>
              <div class="cap-stats">
                <span class="cap-stat">${m.approved} / ${m.cap}</span>
                <span class="cap-remaining ${rem === 0 ? 'cap-full' : ''}">${rem > 0 ? rem + ' volných' : 'Plno'}</span>
              </div>
            </div>
            <div class="cap-bar-wrap">
              <div class="cap-bar-fill ${barCls}" style="width:${pct}%"></div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
    }

    function vResetChoice() {
      return `
    <div class="page-header"><h2 class="page-title">Změna volby mentora</h2></div>
    <div class="form-sec" style="max-width:600px;">
      <p style="font-size:14px;color:var(--text-muted);line-height:1.7;margin-bottom:18px;">
        Pokud chceš změnit svou volbu mentora, můžeš zde zrušit všechny aktuální žádosti
        a začít výběr od začátku. Systém zruší všechny tvoje aktivní žádosti
        a budeš si moci znovu vybrat mentora z katalogu.
      </p>
      <div style="font-size:13px;color:var(--error);font-weight:600;padding:10px 14px;background:var(--error-light);border-radius:6px;border-left:3px solid var(--error);margin-bottom:18px;">
        Tato akce je nevratná — všechny tvoje aktuální žádosti budou zrušeny.
      </div>
      <button class="btn-reject" onclick="switchTab('catalog')">Resetovat volbu a začít znovu</button>
    </div>
  `;
    }

    function vApprovedMentorings() {
      return `
    <div class="page-header"><h2 class="page-title">Domluvené mentoringy (${APPROVED_PAIRS.length})</h2></div>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:24px;">
      Přehled schválených mentorských párů. Další koordinaci řeší HR mimo systém.
    </p>
    <div class="request-list">
      ${APPROVED_PAIRS.map(p => `
        <div class="all-row" style="border-left:3px solid var(--success);">
          <div style="display:flex;align-items:center;gap:10px;flex:1;">
            <span style="font-weight:700;font-size:14px;color:var(--text);">${p.talent}</span>
            <span style="color:var(--gold);font-size:16px;font-weight:700;">↔</span>
            <span style="font-weight:700;font-size:14px;color:var(--primary);">${p.mentor}</span>
          </div>
          <span class="status-badge ${p.status === 'Scheduled' ? 's-scheduled' : 's-approved'}">
            ${p.status === 'Scheduled' ? 'Naplánováno' : 'Schváleno'}
          </span>
        </div>
      `).join('')}
    </div>
  `;
    }

    function toggleMentorDetails(btn) {
      const details = btn.closest('.mentor-details');
      const content = details.querySelector('.mentor-details-content');
      const isExpanded = details.getAttribute('data-expanded') === 'true';

      if (isExpanded) {
        content.style.display = 'none';
        details.setAttribute('data-expanded', 'false');
      } else {
        content.style.display = 'block';
        details.setAttribute('data-expanded', 'true');
      }
    }

    switchRole('talent');
  </script>

</body>

</html>
